services:
  - type: web
    name: ezzeshop-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: ezzeshop-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ezzeshop-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_SECRET_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      - key: CLOUDFLARE_R2_ENDPOINT
        sync: false
      - key: CORS_ORIGIN
        value: https://ezzeshop.vercel.app
      - key: FRONTEND_URL
        value: https://ezzeshop.vercel.app

databases:
  - name: ezzeshop-db
    databaseName: ezzeshop
    user: ezzeshop_user
    plan: starter
    region: oregon
    postgresMajorVersion: 16

  - name: ezzeshop-redis
    plan: starter
    region: oregon
    type: redis
    ipAllowList: []
